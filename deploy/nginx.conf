# AI受電システム PoC — Nginx設定
# 使用方法:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/ai_phone
#   sudo ln -s /etc/nginx/sites-available/ai_phone /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket サポート（Twilio Media Streams に必須）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket タイムアウト（通話中の切断防止）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
